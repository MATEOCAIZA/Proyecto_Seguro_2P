name: DevSecOps Dev->Test->Main Pipeline

# ──────────────────────────────────────────────────────────────────────────────
# TRIGGER:
#   • Pull Request → rama 'test'  : ejecuta toda la cadena (nodos 1-5)
#   • Push         → rama 'main'  : solo notifica el despliegue exitoso
# ──────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - main

jobs:

  # ============================================================================
  # NODO 1: REVISIÓN DE SEGURIDAD (Modelo de Minería ML)
  # Evalúa el código del PR con el modelo predictivo Python.
  # Si hay vulnerabilidades críticas, comenta el PR y bloquea el avance.
  # ============================================================================
  security_scan:
    name: "Revisión de Seguridad (ML)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: write

    steps:
      - name: Descargar código del PR
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del modelo ML
        run: |
          cd seguridad
          pip install -r requirements.txt

      - name: Ejecutar Modelo Predictivo de Seguridad
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:       ${{ github.event.pull_request.number }}
          MODELO_API_URL:  ${{ secrets.MODELO_API_URL }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd seguridad
          python evaluar_pr.py

  # ============================================================================
  # NODO 2: PRUEBAS UNITARIAS SPRING BOOT (JUnit 5 + JaCoCo)
  # Depende del Nodo 1. Corre en PARALELO con el Nodo 3.
  # Ejecuta los 50+ tests unitarios y genera el reporte de cobertura JaCoCo.
  # ============================================================================
  spring_boot_tests:
    name: "Pruebas JUnit 5 + Cobertura JaCoCo"
    needs: security_scan
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas unitarias y generar reporte de cobertura
        run: |
          cd backend
          chmod +x ./mvnw
          ./mvnw clean test -Dexcludes="**/*IntegrationTest.java"
        env:
          # Variables de entorno mínimas para que Spring arranque en modo test
          # (sin BD real: las pruebas usan Mockito, no necesitan PostgreSQL)
          SPRING_DATASOURCE_URL:      jdbc:h2:mem:testdb
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect

      - name: Publicar reporte de cobertura JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Notificar fallo via Telegram (solo si falla)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ *Nodo 2 FALLÓ* — Pruebas JUnit en PR #${{ github.event.pull_request.number }}%0ARevisa los logs en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="Markdown"

  # ============================================================================
  # NODO 3: PRUEBAS DE INTEGRACIÓN (RabbitMQ + Spring Boot)
  # Depende del Nodo 1. Corre en PARALELO con el Nodo 2.
  # Levanta RabbitMQ y PostgreSQL como servicios y ejecuta los tests de integración.
  # ============================================================================
  integration_tests:
    name: "Pruebas de Integración (RabbitMQ)"
    needs: security_scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB:       zonas_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas de integración
        run: |
          cd backend
          chmod +x ./mvnw
          ./mvnw test -Dtest="*IntegrationTest" -DfailIfNoTests=false
        env:
          # No se pasan variables de DataSource: el test usa @ActiveProfiles("integration")
          # + autoconfigure exclusions, por lo que Spring no intenta conectar a ninguna DB.
          SPRING_RABBITMQ_HOST:     localhost
          SPRING_RABBITMQ_PORT:     5672
          SPRING_RABBITMQ_USERNAME: guest
          SPRING_RABBITMQ_PASSWORD: guest

      - name: Publicar reporte de pruebas de integración
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: backend/target/surefire-reports/

      - name: Notificar fallo via Telegram (solo si falla)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ *Nodo 3 FALLÓ* — Pruebas de Integración en PR #${{ github.event.pull_request.number }}%0ARevisa los logs en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d parse_mode="Markdown"

  # ============================================================================
  # NODO 4: CONVERGENCIA — MERGE A TEST
  # Espera a que el Nodo 2 Y el Nodo 3 terminen con éxito.
  # Hace el merge automático del PR a la rama 'test' y notifica por Telegram.
  # ============================================================================
  merge_to_test:
    name: "Merge a Test"
    needs: [spring_boot_tests, integration_tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Descargar código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge automático del PR a la rama 'test'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --auto \
            --subject "✅ [CI] Merge automático PR #${{ github.event.pull_request.number }} → test"

      - name: Notificar éxito via Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Pipeline exitoso*%0A%0A🔍 Seguridad: PASADO%0A🧪 JUnit + JaCoCo: PASADO%0A🔗 Integración RabbitMQ: PASADO%0A%0A🔀 PR \`#${{ github.event.pull_request.number }}\` mergeado a \`test\` correctamente."

  # ============================================================================
  # NODO 4.5: MERGE AUTOMÁTICO TEST → MAIN
  # Depende del Nodo 4. Una vez que el merge a test fue exitoso,
  # fusiona la rama test en main automáticamente.
  # ============================================================================
  merge_to_main:
    name: "Merge a Main"
    needs: merge_to_test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: write

    steps:
      - name: Descargar código de la rama main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar usuario de Git (Bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fusionar test en main y hacer Push
        run: |
          git fetch origin test
          git merge origin/test --no-edit
          git push origin main

      - name: Notificar merge a main via Telegram
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🔀 *Merge automático exitoso*%0A%0ARama \`test\` fusionada en \`main\` correctamente.%0A%0A🚀 Iniciando despliegue en producción..."

  # ============================================================================
  # NODO 5: DESPLIEGUE EN PRODUCCIÓN (Docker + Render)
  # Depende del Nodo 4.5. Se ejecuta tras el merge automático a main.
  # ============================================================================
  deploy_production:
    name: "Build Docker y Despliegue en Render"
    needs: merge_to_main
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y empaquetar el backend
        run: |
          cd backend
          chmod +x ./mvnw
          ./mvnw package -DskipTests

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mi-backend:latest 

      # --- NUEVO MENSAJE: DOCKERIZACIÓN EXITOSA ---
      - name: Notificar Docker Push via Telegram
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🐳 *Paso 1/2: Imagen Docker Lista*%0A%0ASe ha construido y subido la imagen de Spring Boot a Docker Hub correctamente.%0A%0A⏳ Iniciando el despliegue automático en Render..."

      # --- INICIO DEL DESPLIEGUE EN RENDER ---
      - name: Disparar re-deploy en Render (Deploy Hook)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Esperar a que el contenedor de Spring Boot levante
        run: |
          echo "Iniciando despliegue en Render. Esperando a que el servidor responda..."
          
          # REEMPLAZA ESTO CON LA URL PÚBLICA DE TU SERVICIO EN RENDER:
          URL="https://tu-backend-espe.onrender.com" 
          
          sleep 40 
          
          TIMEOUT=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" $URL)
            
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 401 ] || [ "$STATUS" -eq 403 ] || [ "$STATUS" -eq 404 ]; then
              echo "✅ ¡La aplicación está arriba y respondiendo en Producción! (HTTP $STATUS)"
              exit 0
            fi
            
            echo "Aún arrancando... (HTTP $STATUS). Reintentando en 15 segundos."
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "❌ Tiempo de espera agotado. El contenedor no logró arrancar a tiempo."
          exit 1

      # --- MENSAJE FINAL: DESPLIEGUE EXITOSO ---
      - name: Notificar despliegue exitoso via Telegram
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="🚀 *Paso 2/2: Despliegue Exitoso*%0A%0AEl contenedor ya está online y respondiendo peticiones.%0ARama: \`main\`%0ACommit: \`${{ github.sha }}\`"

      # --- MENSAJE DE FALLO GLOBAL ---
      - name: Notificar fallo del despliegue via Telegram
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *ERROR EN EL PIPELINE DE PRODUCCIÓN*%0A%0AAlgo falló durante la creación de Docker o el arranque en Render.%0ARama: \`main\`%0ARevisa los logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"