name: DevSecOps Dev->Test->Main Pipeline

# Trigger: El pipeline se activa al hacer un Pull Request hacia la rama 'test'
on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - main

jobs:
  # ==========================================
  # ETAPA 1: REVISIÓN DE SEGURIDAD (MINERÍA)
  # ==========================================
  security_scan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    
    # CAMBIO 1: Permisos de escritura necesarios para que evaluar_pr.py 
    # pueda comentar el PR, crear la issue vinculada y asignar la etiqueta fixing-required
    permissions:
      pull-requests: write
      issues: write
      contents: write

    steps:
      - name: Descargar código del PR
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias de ML
        run: |
          cd seguridad
          pip install -r requirements.txt

      - name: Ejecutar Modelo Predictivo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MODELO_API_URL: ${{ secrets.MODELO_API_URL }}
          # CAMBIO 2: Descomentadas las variables de Telegram para inyectar los secrets al script
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd seguridad
          python evaluar_pr.py