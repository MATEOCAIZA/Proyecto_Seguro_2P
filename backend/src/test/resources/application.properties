# Activa el perfil 'test' automáticamente al ejecutar mvn test
# Spring cargará application-test.properties encima de application.yaml
spring.profiles.active=test
# Si la variable de entorno DB_URL no existe en Render, usará localhost por defecto
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/zonas_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

spring.rabbitmq.addresses=${RABBITMQ_URL:amqp://guest:guest@localhost:5672}