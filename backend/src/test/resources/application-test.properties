# ──────────────────────────────────────────────────────────────────────────────
# Configuración de pruebas — Spring Boot usa H2 en memoria (sin PostgreSQL real)
# Este archivo se activa automáticamente cuando se corre: mvn test
# ──────────────────────────────────────────────────────────────────────────────

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Deshabilitar la consola de H2 (no hace falta en tests)
spring.h2.console.enabled=false

# URL del microservicio ML (valor ficticio para que el contexto arranque sin error)
# Los tests de AnalisisServicio usan Mockito sobre WebClient, no hacen llamadas reales
analisis.microservicio.url=http://localhost:9999
