# ──────────────────────────────────────────────────────────────────────────────
# Perfil 'integration': usado exclusivamente por RabbitMQIntegrationTest.
# Levanta una BD H2 en memoria para que los repositorios JPA se instancien
# correctamente sin necesidad de PostgreSQL.
# Los valores de RabbitMQ son sobrescritos por @DynamicPropertySource.
# ──────────────────────────────────────────────────────────────────────────────

# URL del microservicio ML (valor ficticio; AnalisisServicio está mockeado)
analisis.microservicio.url=http://localhost:9999

# RabbitMQ — valores placeholder
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# --- BASE DE DATOS H2 EN MEMORIA PARA LA PRUEBA ---
spring.datasource.url=jdbc:h2:mem:zonas_integration;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

