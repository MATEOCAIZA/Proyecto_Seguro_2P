spring:
  application:
    name: zonas
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zonas_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # === AQUÍ ESTÁ EL CAMBIO ===
  rabbitmq:
    addresses: ${RABBITMQ_URL:amqp://guest:guest@localhost:5672}

# Microservicio de análisis de vulnerabilidades (FastAPI Python)
analisis:
  microservicio:
    url: ${MODELO_API_URL:http://localhost:8000}